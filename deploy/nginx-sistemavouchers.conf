# ============================================================
#  Nginx (aaPanel) - Proxy inverso para Sistema de Vouchers
#  La app Node escucha en 127.0.0.1:3000 y sirve API + frontend.
#  En aaPanel: Sitio web -> (tu dominio) -> Reverse Proxy, o pega
#  este bloque en la configuracion del sitio.
# ============================================================
server {
    listen 80;
    server_name vouchers.tudominio.com;   # <-- cambia por tu dominio

    # IMPORTANTE: permitir subidas de imagenes (max 10 MB c/u, hasta 5).
    client_max_body_size 60m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 120s;
    }
}

# Tras instalar el certificado SSL desde aaPanel (Let's Encrypt), aaPanel
# agrega el listen 443 y la redireccion 80->443 automaticamente.
